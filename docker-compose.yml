version: "3.9"

services:
  api:
    build: .
    container_name: legal-chatbot-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - TEST_API_BASE_URL=http://api:8000
      - TEST_RUNNER_MODE=api
    ports:
      - "8000:8000"
    volumes:
      - ./Multi-Agent:/app/Multi-Agent
      - ./vector_store:/app/vector_store
      - ./metadata:/app/metadata
      - ./testsuite:/app/testsuite
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped

  dashboard:
    build: .
    container_name: legal-chatbot-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    environment:
      - TEST_API_BASE_URL=http://api:8000
      - TEST_RUNNER_MODE=api
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./Multi-Agent:/app/Multi-Agent
      - ./vector_store:/app/vector_store
      - ./metadata:/app/metadata
      - ./testsuite:/app/testsuite
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped

  scheduler:
    build: .
    container_name: legal-chatbot-scheduler
    command: python schedule_test_runner.py --plan weekly-full --runner-mode api --send-report-email
    env_file:
      - .env
    environment:
      - TEST_API_BASE_URL=http://api:8000
      - TEST_RUNNER_MODE=api
    depends_on:
      - api
    volumes:
      - ./Multi-Agent:/app/Multi-Agent
      - ./vector_store:/app/vector_store
      - ./metadata:/app/metadata
      - ./testsuite:/app/testsuite
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped
    profiles:
      - scheduler
