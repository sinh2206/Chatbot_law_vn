services:
  app:
    image: chatbot-law-vn:cpu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_CUDA_TORCH: "0"
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/huggingface/sentence-transformers
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-dangvantuan/vietnamese-embedding}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GEMINI_FALLBACK_ENABLED: ${GEMINI_FALLBACK_ENABLED:-false}
      MIN_RETRIEVAL_SCORE: ${MIN_RETRIEVAL_SCORE:-0.45}
    volumes:
      - ./:/app
      - hf-cache:/root/.cache/huggingface
      - torch-cache:/root/.cache/torch
    stdin_open: true
    tty: true
    command: bash

  gpu:
    profiles:
      - gpu
    image: chatbot-law-vn:gpu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_CUDA_TORCH: "1"
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/huggingface/sentence-transformers
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-dangvantuan/vietnamese-embedding}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GEMINI_FALLBACK_ENABLED: ${GEMINI_FALLBACK_ENABLED:-false}
      MIN_RETRIEVAL_SCORE: ${MIN_RETRIEVAL_SCORE:-0.45}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./:/app
      - hf-cache:/root/.cache/huggingface
      - torch-cache:/root/.cache/torch
    gpus: all
    stdin_open: true
    tty: true
    command: bash

volumes:
  hf-cache:
  torch-cache:
