<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Law Multi-Agent Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="title-wrap">
          <h1>Legal Assistant</h1>
          <p>Multi-Agent RAG + Web Fallback</p>
        </div>
        <div class="header-actions">
          <div id="statusBadge" class="status-badge offline">Offline</div>
          <a class="ghost-btn" href="/dashboard" target="_blank" rel="noopener">Dashboard</a>
          <button id="clearBtn" class="ghost-btn" type="button">Clear</button>
        </div>
      </header>

      <main id="chatHistory" class="chat-history" aria-live="polite"></main>

      <section class="composer">
        <div class="toolbar-row">
          <label for="domainSelect">Lĩnh vực</label>
          <select id="domainSelect">
            <option value="">Tất cả lĩnh vực</option>
            <option value="DoanhNghiep">Doanh nghiệp</option>
            <option value="HoTich">Hộ tịch</option>
            <option value="CCCD">Căn cước công dân</option>
            <option value="DatDai">Đất đai</option>
            <option value="Thue">Thuế</option>
          </select>
        </div>

        <form id="chatForm" class="input-row">
          <textarea
            id="questionInput"
            placeholder="Nhập câu hỏi pháp lý của bạn..."
            rows="2"
            required
          ></textarea>
          <button id="sendBtn" type="submit">Gửi</button>
        </form>
      </section>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="bubble"></div>
      </article>
    </template>

    <script src="/frontend/script.js"></script>
  </body>
</html>
