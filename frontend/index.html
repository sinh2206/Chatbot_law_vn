<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot Law VN</title>
    <link rel="icon" href="assets/scales.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Conversations">
        <div class="brand-row">
          <img src="assets/scales.svg" alt="" class="brand-mark" />
          <div>
            <h1>Law VN</h1>
            <p>Legal RAG</p>
          </div>
        </div>

        <button class="new-chat-button" id="newChatButton" type="button">
          <span aria-hidden="true">+</span>
          <span>Cuộc trò chuyện mới</span>
        </button>

        <nav class="chat-list" aria-label="Saved chats">
          <button class="chat-list-item active" type="button">Tư vấn hiện tại</button>
          <button class="chat-list-item" type="button">Kiểm tra căn cước</button>
          <button class="chat-list-item" type="button">Thuế và hóa đơn</button>
        </nav>
      </aside>

      <main class="chat-area">
        <header class="topbar">
          <div class="model-title">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Chatbot Luật VN</span>
          </div>
          <div class="toolbar">
            <label>
              <span>Domain</span>
              <select id="domainSelect">
                <option value="">Tự động</option>
                <option value="CCCD">CCCD</option>
                <option value="DatDai">Đất đai</option>
                <option value="DoanhNghiep">Doanh nghiệp</option>
                <option value="HoTich">Hộ tịch</option>
                <option value="Thue">Thuế</option>
                <option value="Uploaded">Tài liệu tải lên</option>
              </select>
            </label>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">L</div>
            <div class="bubble">
              <p>Chatbot Luật VN xin chào, rất vui được giúp đỡ bạn.</p>
            </div>
          </article>
        </section>

        <form class="composer" id="chatForm">
          <textarea id="promptInput" rows="1" placeholder="Hỏi về CCCD, đất đai, thuế, hộ tịch..." autocomplete="off"></textarea>
          <label class="file-button" title="Đính kèm PDF">
            <input id="pdfInput" type="file" accept="application/pdf,.pdf" />
            <span>PDF</span>
          </label>
          <button class="send-button" type="submit" title="Send" aria-label="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2 11 13M22 2l-7 20-4-9-9-4z" />
            </svg>
          </button>
          <div class="file-status" id="fileStatus" aria-live="polite"></div>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
